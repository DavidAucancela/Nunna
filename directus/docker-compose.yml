services:
  directus:
    image: directus/directus:11
    ports:
      - "8055:8055"
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    environment:
      SECRET: "directus-secret-local-dev"
      KEY: "directus-key-local-dev"
      DB_CLIENT: "pg"
      DB_HOST: host.docker.internal  # apunta a Postgres local o Supabase
      DB_PORT: "5432"
      DB_DATABASE: "postgres"
      DB_USER: "postgres"
      DB_PASSWORD: "${DB_PASSWORD}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@local.dev}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"
      PUBLIC_URL: "http://localhost:8055"
      # CORS — permite el frontend local
      CORS_ENABLED: "true"
      CORS_ORIGIN: "http://localhost:3000"
      # Cache
      CACHE_ENABLED: "false"

volumes:
  directus_uploads:
  directus_extensions:
